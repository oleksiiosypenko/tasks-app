<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Мои задачи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;padding-bottom:85px;background:#0d0d0e;color:#fff}
:root{
  --bg:#0d0d0e;--bg2:#1e1e20;--bg3:#333336;--text:#fff;--text2:#b0b0b5;
  --accent:#6b69ff;--border:#3a3a3c;
  --q1:#ff453a;--q1bg:#4a1515;--q1t:#ff827a;
  --q2:#5e5ce6;--q2bg:#1e1e4a;--q2t:#a3a3ff;
  --q3:#ff9f0a;--q3bg:#4d3000;--q3t:#ffc15e;
  --q4:#8e8e93;--q4bg:#2c2c2e;--q4t:#d1d1d6;
  --success:#30d158;--danger:#ff453a;--warning:#ff9f0a;
  --radius:12px;--radius-sm:8px;
}
.topbar{padding:16px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:22px;font-weight:700}
.topbar-right{display:flex;gap:4px;align-items:center}
.icon-btn{background:none;border:none;cursor:pointer;color:#fff;padding:6px;display:flex;align-items:center}
.icon-btn:active{transform:scale(0.9)}

/* Tiles */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 16px 6px}
.tile{background:var(--bg2);border-radius:var(--radius);padding:12px;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.tile.active{border-color:var(--accent);background:#252528}
.tile:active{transform:scale(.97)}
.tile-n{font-size:24px;font-weight:700;line-height:1;margin-bottom:3px}
.tile-l{font-size:11px;color:var(--text2);font-weight:500}
.tile-n.red{color:var(--danger)}

/* Progress */
.prog-wrap{margin:8px 16px;background:var(--bg2);padding:12px;border-radius:var(--radius)}
.prog-bar{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden}
.prog-fill{background:var(--accent);height:100%;border-radius:6px;transition:width .3s}
.prog-label{display:flex;justify-content:space-between;font-size:12px;color:#fff;margin-top:6px;font-weight:500}
.total-label{display:flex;justify-content:space-between;font-size:13px;color:#fff;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.total-label strong{color:#ffb340;font-size:15px;font-weight:700}

/* Filters */
.filters{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.seg{display:flex;background:var(--bg2);border-radius:var(--radius-sm);padding:3px;flex-shrink:0}
.seg button{background:none;border:none;padding:6px 14px;font-size:13px;border-radius:6px;cursor:pointer;color:var(--text2);white-space:nowrap;font-weight:600}
.seg button.on{background:var(--accent);color:#fff;font-weight:700}

/* Add btn */
.add-btn{margin:8px 16px;padding:12px;border:1.5px dashed var(--accent);border-radius:var(--radius);background:rgba(107,105,255,.05);cursor:pointer;color:#a3a1ff;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;width:calc(100% - 32px)}
.add-btn:active{background:rgba(107,105,255,.15)}

/* Task list */
.task-list{padding:4px 16px;display:flex;flex-direction:column;gap:8px}
.q-label{font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 2px;display:flex;align-items:center;gap:6px}
.q-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Task card */
.task{background:var(--bg2);border-radius:0 var(--radius) var(--radius) 0;padding:12px;display:flex;gap:10px;align-items:flex-start;border-left:4px solid var(--border)}
.task.q1{border-left-color:var(--q1);background:linear-gradient(90deg,#241616 0%,var(--bg2) 15%)}
.task.q2{border-left-color:var(--q2);background:linear-gradient(90deg,#16162a 0%,var(--bg2) 15%)}
.task.q3{border-left-color:var(--q3);background:linear-gradient(90deg,#241f16 0%,var(--bg2) 15%)}
.task.q4{border-left-color:var(--q4);opacity:.6}

/* Выполненные */
.task.q6{border-left-color:var(--success);background:linear-gradient(90deg,#0a2410 0%,var(--bg2) 15%)}
.task.done-task{opacity:.5;filter:grayscale(20%)}
.task.done-task .task-title{text-decoration:line-through;color:var(--text2)}

.task.overdue-task{border-left-color:var(--danger)!important;background:linear-gradient(90deg,#3a1515 0%,var(--bg2) 18%)!important}
.task.window-task{border-left-color:#ff6b00!important;background:linear-gradient(90deg,#2a1800 0%,var(--bg2) 18%)!important}
.task.inprogress-task{border-left-color:var(--accent)!important;background:linear-gradient(90deg,#1a1a3a 0%,var(--bg2) 18%)!important}
.task.paused-task{border-left-color:#666!important;background:linear-gradient(90deg,#1a1a1a 0%,var(--bg2) 18%)!important}

.check{width:24px;height:24px;border:2px solid #fff;border-radius:50%;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px;background:rgba(255,255,255,.05);font-size:13px}
.check.on{background:var(--success);border-color:var(--success)}
.task-body{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px;word-break:break-word;line-height:1.4}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.b-business{background:#0a4d2c;color:#41f27c}
.b-personal{background:#4d1a70;color:#d696ff}
.b-q1{background:var(--q1bg);color:var(--q1t)}
.b-q2{background:var(--q2bg);color:var(--q2t)}
.b-q3{background:var(--q3bg);color:var(--q3t)}
.b-q4{background:var(--q4bg);color:var(--q4t)}
.b-overdue{background:#5a1818;color:#ff827a}
.b-window{background:#2a1800;color:#ff9f0a}
.b-inprogress{background:#1a1a3a;color:#a3a3ff}
.b-paused{background:#222;color:#888}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tmeta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:3px;font-weight:500}

/* Task action buttons */
.task-actions{display:flex;gap:6px;margin-top:8px}
.task-actions .tab{flex:1;padding:7px 6px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;text-align:center}
.tab-start{background:var(--accent);color:#fff}
.tab-resume{background:var(--q2bg);color:var(--q2t);border:1px solid #3a3a6a}
.tab-del{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;display:flex;align-items:center;font-size:16px;flex-shrink:0}
.tab-del:active{color:var(--danger)}

.empty{text-align:center;padding:50px 20px;color:var(--text2);font-size:15px}

/* Kanban */
.kanban-wrap{padding:0 16px}
.k-empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:15px;line-height:1.6}
.k-empty-icon{font-size:48px;display:block;margin-bottom:12px}
.k-card{background:var(--bg2);border-radius:var(--radius);padding:16px;border:1px solid var(--border)}
.k-card.inprogress{border-color:var(--accent);background:linear-gradient(135deg,#1a1a3a 0%,var(--bg2) 40%)}
.k-card.paused{border-color:#555;background:linear-gradient(135deg,#1a1a1a 0%,var(--bg2) 40%)}
.k-card-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.k-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.k-status-dot.inprogress{background:var(--accent);box-shadow:0 0 8px var(--accent)}
.k-status-dot.paused{background:#666}
.k-status-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.k-status-label.inprogress{color:var(--q2t)}
.k-status-label.paused{color:#888}
.k-title{font-size:17px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3}
.k-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.timer-block{background:#0d0d1a;border-radius:var(--radius-sm);padding:14px;margin-bottom:12px;border:1px solid #2a2a4a}
.timer-val{font-size:42px;font-weight:700;font-family:monospace;color:#fff;line-height:1;text-align:center}
.timer-val.paused-val{color:#555}
.timer-prog{background:#1a1a2a;border-radius:4px;height:6px;margin-top:10px;overflow:hidden}
.timer-fill{background:var(--accent);height:100%;border-radius:4px;transition:width 1s linear}
.timer-fill.paused-fill{background:#444}
.k-actions{display:flex;gap:8px;margin-bottom:8px}
.k-actions2{display:flex;gap:8px}
.kbtn{flex:1;padding:11px 8px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.kbtn:active{opacity:.8}
.kbtn-done{background:var(--success);color:#fff}
.kbtn-resume{background:var(--accent);color:#fff}
.kbtn-pause{background:var(--warning);color:#000}
.kbtn-cancel{background:var(--bg3);color:#fff}
.kbtn-extend{background:#1a1a3a;color:#a3a3ff;border:1px solid #3a3a6a}

/* Digest */
.digest-wrap{padding:0 16px}
.digest-box{background:var(--bg2);border-radius:var(--radius);padding:16px;font-size:14px;line-height:1.7;white-space:pre-wrap;font-family:monospace;color:#fff;border:1px solid var(--border)}

/* Settings */
.settings-wrap{padding:0 16px}
.settings-section{margin-bottom:20px}
.settings-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.settings-row{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;border:1px solid var(--border)}
.settings-row-label{font-size:14px;font-weight:600}
.settings-row-sub{font-size:12px;color:var(--text2);margin-top:2px}
.settings-row input,.settings-row select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:#fff;padding:6px 10px;font-size:14px;font-weight:600;min-width:80px;text-align:center}
.settings-full{background:var(--bg2);border-radius:var(--radius-sm);padding:14px;margin-bottom:8px;border:1px solid var(--border)}
.settings-full label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600}
.settings-full input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:#fff;padding:10px 12px;font-size:14px}
.toggle{width:48px;height:26px;background:var(--bg3);border-radius:13px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:25px}
.settings-save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#121214;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 0;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;gap:3px}
.nav-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.on{color:var(--accent);border-top:2px solid var(--accent);padding-top:8px}

/* Modals */
.toast{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#171719;border-radius:24px 24px 0 0;padding:20px 16px 36px;width:100%;max-height:92vh;overflow-y:auto;border-top:1px solid #2c2e}
.modal-handle{width:40px;height:5px;background:var(--bg3);border-radius:3px;margin:0 auto 16px}
.modal h2{font-size:19px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{font-size:13px;color:#fff;display:block;margin-bottom:6px;font-weight:600}
.form-group input,.form-group select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg2);color:#fff;outline:none;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-section{background:rgba(255,255,255,.02);padding:10px;border-radius:var(--radius-sm);margin-bottom:14px;border:1px solid var(--border)}
.form-section-title{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.q-option{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px;cursor:pointer;background:var(--bg2)}
.q-option.selected{border-color:var(--accent);background:#252528}
.q-option-title{font-size:13px;font-weight:700}
.q-option-sub{font-size:10px;color:var(--text2);margin-top:2px}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:16px;font-weight:700}
.loading-wrap{text-align:center;padding:40px;color:var(--text2);font-size:14px;font-weight:600}
.time-wrap{position:relative}
.time-wrap::after{content:'🕒';position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px}
.time-wrap input{padding-right:36px}
</style>
</head>
<body>

<!-- TASKS -->
<div id="page-tasks">
  <div class="topbar">
    <h1>Задачи</h1>
    <div class="topbar-right">
      <button class="icon-btn" onclick="loadTasks()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.72"/></svg></button>
      <button class="icon-btn" onclick="showPage('settings')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="prog-wrap">
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-label"><span>Прогресс дня</span><span id="prog-label">0м / 0м</span></div>
    <div class="total-label"><span>⏱ Осталось:</span><span id="total-val"><strong>0м</strong></span></div>
  </div>
  <div class="filters">
    <div class="seg" id="seg-cat">
      <button class="on" onclick="setFilter('cat','all')">Все</button>
      <button onclick="setFilter('cat','business')">Бизнес</button>
      <button onclick="setFilter('cat','personal')">Личное</button>
    </div>
    <div class="seg" id="seg-date">
      <button id="btn-today" class="on" onclick="setFilter('date','today')">Сегодня</button>
      <button id="btn-all" onclick="setFilter('date','all')">Все</button>
    </div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Добавить задачу</button>
  <div class="task-list" id="task-list"></div>
</div>

<!-- KANBAN -->
<div id="page-kanban" style="display:none">
  <div class="topbar">
    <h1>Канбан</h1>
    <button class="icon-btn" onclick="renderKanban()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l.73-.72"/></svg></button>
  </div>
  <div class="kanban-wrap" id="kanban-wrap"></div>
</div>

<!-- DIGEST -->
<div id="page-digest" style="display:none">
  <div class="topbar"><h1>Дайджест</h1></div>
  <div class="digest-wrap"><div class="digest-box" id="digest-text"></div></div>
</div>

<!-- SETTINGS -->
<div id="page-settings" style="display:none">
  <div class="topbar">
    <h1>Настройки</h1>
    <button class="icon-btn" onclick="showPage('tasks')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>
  <div class="settings-wrap">
    <div class="settings-section">
      <div class="settings-section-title">🔔 Уведомления</div>
      <div class="settings-row">
        <div><div class="settings-row-label">Время дайджеста</div></div>
        <input type="text" id="s-digest-time" value="08:00" maxlength="5" style="width:75px"/>
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label">Напомнить за N мин</div></div>
        <input type="number" id="s-notify-before" value="10" style="width:65px"/>
      </div>
      <div class="settings-full">
        <label>Текст уведомления</label>
        <input type="text" id="s-notify-text"/>
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label">Уведомления включены</div></div>
        <button class="toggle on" id="s-notify-on" onclick="this.classList.toggle('on')"></button>
      </div>
    </div>
    <button class="settings-save-btn" onclick="saveSettings()">💾 Сохранить</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Новая задача</h2>
    <input type="hidden" id="f-id"/>
    <div class="form-group">
      <label>Название</label>
      <input type="text" id="f-title" placeholder="Что нужно сделать?"/>
    </div>
    <div class="form-group">
      <label>Квадрант</label>
      <div class="q-grid">
        <div class="q-option selected" data-q="1" onclick="selectQ(1)"><div class="q-option-title" style="color:var(--q1t)">Важное+Срочное</div></div>
        <div class="q-option" data-q="2" onclick="selectQ(2)"><div class="q-option-title" style="color:var(--q2t)">Важное, не срочное</div></div>
        <div class="q-option" data-q="3" onclick="selectQ(3)"><div class="q-option-title" style="color:var(--q3t)">Срочное, не важное</div></div>
        <div class="q-option" data-q="4" onclick="selectQ(4)"><div class="q-option-title" style="color:var(--q4t)">Низкий приоритет</div></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Категория</label><select id="f-cat"><option value="business">Бизнес</option><option value="personal">Личное</option></select></div>
      <div class="form-group"><label>Повторяемость</label><select id="f-recurrence"><option value="none">Один раз</option><option value="daily">Каждый день</option><option value="weekdays">По будням</option><option value="weekends">По выходным</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Дедлайн</label><input type="date" id="f-deadline"/></div>
      <div class="form-group"><label>Длительность (мин)</label><input type="number" id="f-mins" placeholder="30"/></div>
    </div>
    <div class="form-section">
      <div class="form-section-title">🕒 Временное окно</div>
      <div class="form-row">
        <div class="form-group"><label>С</label><div class="time-wrap"><input type="text" id="f-time-from" placeholder="09:00"/></div></div>
        <div class="form-group"><label>До</label><div class="time-wrap"><input type="text" id="f-time-to" placeholder="10:00"/></div></div>
      </div>
    </div>
    <div class="form-section">
      <div class="form-row">
        <div class="form-group"><label>С числа</label><input type="number" id="f-day-from"/></div>
        <div class="form-group"><label>По число</label><input type="number" id="f-day-to"/></div>
      </div>
    </div>
    <button class="btn-primary" id="save-btn" onclick="saveTask()">Сохранить задачу</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-btn on" id="nav-tasks" onclick="showPage('tasks')"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Задачи</button>
  <button class="nav-btn" id="nav-kanban" onclick="showPage('kanban')"><svg viewBox="0 0 24 24"><path d="M12 2v10l4 4M12 22a10 10 0 1 1 0-20 10 10 0 0 1 0 20z"/></svg>Фокус</button>
  <button class="nav-btn" id="nav-digest" onclick="showPage('digest')"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>Дайджест</button>
</nav>

<script>
const tg = window.Telegram?.WebApp; if(tg) tg.expand();
const API = 'https://script.google.com/macros/s/AKfycbx07U6LxV5SRa3_llFS2E5lUUP4fC2tA6eu4cotWXHIVGnK0hJRYd5HHeHbfky9Tnnu/exec';

let tasks = [];
let nextId = Date.now();
let filter = {cat:'all', date:'today', tile:null};
let selectedQ = 1; let timerInterval = null; let currentPage = 'tasks';
let appSettings = { digestTime:'08:00', notifyBefore:10, notifyText:'', notifyOn:true, showDone:true };

const Q_LABELS = ['','Важное+Срочное','Важное','Срочное','Низкий приоритет'];

function initTimeMask(id) {
  const el = document.getElementById(id); if(!el) return;
  el.addEventListener('input', function(){
    let v = this.value.replace(/\D/g,''); if(v.length>4) v=v.slice(0,4);
    if(v.length>=3) v=v.slice(0,2)+':'+v.slice(2); this.value=v;
  });
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function normalizeTask(t){
  let deadline=''; if(t.deadline){ const m=String(t.deadline).match(/^(\d{4}-\d{2}-\d{2})/); if(m) deadline=m[1]; }
  function cleanTime(v){ if(!v) return ''; const s=String(v), iso=s.match(/T(\d{2}):(\d{2})/); return iso?iso[1]+':'+iso[2]:(s.match(/^(\d{2}):(\d{2})/)?s.slice(0,5):''); }
  return { ...t, id:String(t.id), deadline, time_from:cleanTime(t.time_from), time_to:cleanTime(t.time_to), quadrant:Number(t.quadrant)||1, mins:Number(t.mins)||0, worked_mins:Number(t.worked_mins)||0, 
  done: String(t.done).toLowerCase()==='true'||t.done===1||t.done===true, status:t.status||'new', recurrence:t.recurrence||'none', started_at:t.started_at||'', paused_at:t.paused_at||'', paused_remaining:Number(t.paused_remaining)||0 };
}

/* ИСПРАВЛЕНИЕ: Локальная зона для "Сегодня", чтобы избежать багов с пропаданием после полуночи */
function todayStr(){ const d=new Date(); return new Date(d.getTime()-(d.getTimezoneOffset()*60000)).toISOString().split('T')[0]; }
function tomorrowStr(){ const d=new Date(Date.now()+86400000); return new Date(d.getTime()-(d.getTimezoneOffset()*60000)).toISOString().split('T')[0]; }
function getTaskOverdueType(t){ if(t.status==='missed') return 'missed'; if(t.deadline&&!t.done&&t.deadline<todayStr()) return 'deadline'; return null; }

async function apiFetch(method,data){
  try{ const r=method==='GET'?await fetch(API+'?action=getTasks&t='+Date.now()):await fetch(API,{method:'POST',body:JSON.stringify(data)}); return await r.json(); }
  catch(e){ showToast('Ошибка соединения'); return null; }
}

async function loadSettings(){
  try{ const r=await fetch(API+'?action=getSettings'); const d=await r.json(); if(d&&!d.error) appSettings={...appSettings,...d}; }catch(e){}
  const tsd=document.getElementById('s-show-done'); if(tsd) tsd.classList.toggle('on',!!appSettings.showDone);
}

async function saveSettings(){
  appSettings.showDone=document.getElementById('s-show-done')?.classList.contains('on');
  await apiFetch('POST',{action:'saveSettings',settings:appSettings}); showToast('Сохранено ✅');
}

async function loadTasks(){
  document.getElementById('task-list').innerHTML='<div class="loading-wrap">Загрузка...</div>';
  const data=await apiFetch('GET'); if(data&&Array.isArray(data)){ tasks=data.map(normalizeTask); nextId=Math.max(...tasks.map(t=>Number(t.id)||0),Date.now())+1; }
  autoSelectCat(); render(); if(currentPage==='kanban') renderKanban();
}

function fmtMins(m){ m=Number(m); return !m?'0м':(m<60?m+'м':Math.floor(m/60)+'ч'+(m%60?' '+m%60+'м':'')); }
function fmtDate(dl){ if(!dl)return ''; const d=new Date(dl+'T12:00:00'); return isNaN(d.getTime())?'':d.toLocaleDateString('ru',{day:'numeric',month:'short'}); }

function getFiltered(){
  let t=[...tasks]; const td=todayStr(), tm=tomorrowStr();
  if(filter.cat!=='all') t=t.filter(x=>x.cat===filter.cat);

  if(filter.tile==='today') t=t.filter(x=>x.status!=='missed'&&Number(x.quadrant)!==4&&(!x.deadline||x.deadline<=td));
  else if(filter.tile==='tomorrow') t=t.filter(x=>x.status!=='missed'&&Number(x.quadrant)!==4&&x.deadline===tm);
  else if(filter.tile==='overdue') t=t.filter(x=>getTaskOverdueType(x)!==null&&!x.done);
  else if(filter.date==='today') t=t.filter(x=>x.status!=='missed'&&Number(x.quadrant)!==4&&(!x.deadline||x.deadline<=td));

  t.sort((a,b)=>{
    if(a.status==='inprogress'||a.status==='paused') return -1; if(b.status==='inprogress'||b.status==='paused') return 1;
    if(a.done && !b.done) return 1; if(!a.done && b.done) return -1;
    return Number(a.quadrant)-Number(b.quadrant);
  });
  return t;
}

function autoSelectCat(){
  const tmp=filter.cat; filter.cat='all'; const active=getFiltered().filter(t=>!t.done&&t.status!=='missed');
  if(active.length>0){ filter.cat=(active.some(t=>t.cat==='business')&&active.some(t=>t.cat==='personal'))?'all':(active.some(t=>t.cat==='business')?'business':'personal'); }
  else filter.cat=tmp; syncCatButtons();
}
function syncCatButtons(){ const vals=['all','business','personal']; document.querySelectorAll('#seg-cat button').forEach((b,i)=>b.classList.toggle('on',vals[i]===filter.cat)); }
function syncDateButtons(){ document.getElementById('btn-today').classList.toggle('on',filter.date==='today'&&!filter.tile); document.getElementById('btn-all').classList.toggle('on',filter.date==='all'&&!filter.tile); }

function renderTiles(){
  const td=todayStr(), tm=tomorrowStr(); let base=[...tasks]; if(filter.cat!=='all') base=base.filter(x=>x.cat===filter.cat);
  const todayN=base.filter(t=>!t.done&&t.status!=='missed'&&Number(t.quadrant)!==4&&(!t.deadline||t.deadline<=td)).length;
  const tmN=base.filter(t=>!t.done&&t.status!=='missed'&&Number(t.quadrant)!==4&&t.deadline===tm).length;
  const overdueN=base.filter(t=>getTaskOverdueType(t)!==null&&!t.done).length;
  const tiles=[{key:'today',n:todayN,label:'📅 Сегодня'},{key:'tomorrow',n:tmN,label:'📅 Завтра'},{key:'overdue',n:overdueN,label:'⚠️ Просрочено',cls:overdueN>0?'red':''}];
  document.getElementById('tiles').innerHTML=tiles.map(tile=>`<div class="tile${filter.tile===tile.key?' active':''}" onclick="setTileFilter('${tile.key}')"><div class="tile-n ${tile.cls||''}">${tile.n}</div><div class="tile-l">${tile.label}</div></div>`).join('');
}

function renderProgress(){
  const list=getFiltered(); const ad=list.filter(t=>t.status!=='missed');
  const total=ad.reduce((s,t)=>s+(Number(t.mins)||0)+(Number(t.worked_mins)||0),0);
  const done=ad.reduce((s,t)=>t.done?s+(Number(t.mins)||0)+(Number(t.worked_mins)||0):s+(Number(t.worked_mins)||0),0);
  const pct=total?Math.min(100,Math.round(done/total*100)):0;
  document.getElementById('prog-fill').style.width=pct+'%'; document.getElementById('prog-label').textContent=fmtMins(done)+' / '+fmtMins(total)+' ('+pct+'%)';
  const rem=ad.filter(t=>!t.done).reduce((s,t)=>s+(Number(t.mins)||0),0); document.getElementById('total-val').innerHTML=`<strong>${fmtMins(rem)}</strong>`;
}

function renderTasks(){
  const list=getFiltered(); const el=document.getElementById('task-list'); if(!list.length){el.innerHTML='<div class="empty">Задач нет ✨</div>';return;}
  const groups={1:[],2:[],3:[],4:[],6:[]};
  list.forEach(t=>{ if(t.done) groups[6].push(t); else groups[Number(t.quadrant)||1].push(t); });

  const qNames=['','Важное и срочное','Важное, не срочное','Срочное, не важное','Низкий приоритет','','✅ Выполненные'];
  const qDots=['','#ff453a','#5e5ce6','#ff9f0a','#636366','','#30d158'];
  let html='';

  [1,2,3,4,6].forEach(q=>{
    if(!groups[q]||!groups[q].length) return;
    html+=`<div class="q-label"><span class="q-dot" style="background:${qDots[q]}"></span>${qNames[q]}</div>`;
    html+=groups[q].map(t=>{
      const fire=t.postpone_count?` 🔄${t.postpone_count}х`:''; const rec=t.recurrence&&t.recurrence!=='none'?' 🔁':'';
      const fDate=fmtDate(t.deadline); let extra='';
      if(t.time_from&&t.time_to) extra+=` 🕒 ${t.time_from}–${t.time_to}`;
      
      let cls='q'+q; if(t.status==='inprogress') cls='inprogress-task'; else if(t.status==='paused') cls='paused-task'; else if(getTaskOverdueType(t)) cls='overdue-task';
      if(t.done) cls+=' done-task';

      let statusBadge=t.done?'':`<span class="badge b-q${q}">${Q_LABELS[q]}</span>`;
      if(t.status==='inprogress') statusBadge='<span class="badge b-inprogress">▶ В работе</span>';
      else if(t.status==='paused') statusBadge='<span class="badge b-paused">⏸ Пауза</span>';

      let actionBtn=(!t.done && t.status!=='inprogress' && t.status!=='paused')?`<button class="tab tab-start" data-action="start" data-id="${t.id}">▶ В работу</button>`:'';
      if(!t.done && (t.status==='inprogress'||t.status==='paused')) actionBtn=`<button class="tab tab-resume" data-action="goto-kanban">⏱ Таймер</button>`;

      return `<div class="task ${cls}" data-id="${t.id}">
        <div class="check${t.done?' on':''}" data-action="toggle" data-id="${t.id}">${t.done?'✔':''}</div>
        <div class="task-body" data-action="edit" data-id="${t.id}">
          <div class="task-title">${t.title}${fire}${rec}</div>
          <div class="badges"><span class="badge ${t.cat==='business'?'b-business':'b-personal'}">${t.cat==='business'?'Бизнес':'Личное'}</span>${statusBadge}</div>
          <div class="task-meta">${t.mins&&!t.done?`<span class="tmeta">⏱ ${fmtMins(t.mins)}</span>`:''}${fDate?`<span class="tmeta">📅 ${fDate}</span>`:''}${extra?`<span class="tmeta" style="color:var(--warning)">${extra}</span>`:''}</div>
          ${actionBtn?`<div class="task-actions">${actionBtn}</div>`:''}
        </div>
        <button class="tab-del" data-action="delete" data-id="${t.id}">❌</button>
      </div>`;
    }).join('');
  });
  el.innerHTML=html;
}

document.getElementById('task-list').addEventListener('click',function(e){
  const act=e.target.closest('[data-action]'); if(!act) return;
  const a=act.dataset.action, id=act.dataset.id;
  if(a==='toggle') toggleDone(id); if(a==='edit') openEditModal(id); if(a==='delete') delTask(id); if(a==='start') kanbanStart(id); if(a==='goto-kanban') showPage('kanban');
});

function render(){ renderTiles(); renderProgress(); renderTasks(); syncDateButtons(); }

/* ИСПРАВЛЕНИЕ ФИЛЬТРОВ: Кнопки Категорий больше не сбрасываются авто-функцией при нажатии */
function setFilter(k,v){ 
  if(k==='date'){ filter.tile=null; filter.date=v; autoSelectCat(); } 
  else if(k==='cat') { filter.cat=v; syncCatButtons(); }
  else { filter[k]=v; }
  render(); 
}

function setTileFilter(key){ filter.tile=filter.tile===key?null:key; if(filter.tile) { filter.date='all'; autoSelectCat(); } render(); }

async function toggleDone(id){
  const t=tasks.find(x=>x.id===id); if(!t) return; if(timerInterval) { clearInterval(timerInterval); timerInterval=null; }
  t.done=!t.done; t.status=t.done?'done':'new'; render(); if(currentPage==='kanban') renderKanban();
  await apiFetch('POST',{action:t.done?'doneTask':'updateTask',id,fields:{done:t.done,status:t.status},workedMins:0});
}

async function delTask(id){
  if(!confirm('Удалить задачу?')) return; tasks=tasks.filter(x=>x.id!==id); render();
  await apiFetch('POST',{action:'deleteTask',id});
}

function selectQ(q){ selectedQ=q; document.querySelectorAll('.q-option').forEach(el=>el.classList.toggle('selected',Number(el.dataset.q)===q)); }
function openModal(){
  document.getElementById('modal-title').textContent='Новая задача'; document.getElementById('f-id').value='';
  ['f-title','f-mins','f-time-from','f-time-to','f-day-from','f-day-to'].forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('f-deadline').value=''; document.getElementById('f-recurrence').value='none'; selectQ(1);
  document.getElementById('modal').style.display='flex';
}

function openEditModal(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  document.getElementById('modal-title').textContent='Редактировать'; document.getElementById('f-id').value=t.id;
  document.getElementById('f-title').value=t.title||''; document.getElementById('f-mins').value=t.mins||'';
  document.getElementById('f-recurrence').value=t.recurrence||'none'; document.getElementById('f-day-from').value=t.day_from||'';
  document.getElementById('f-day-to').value=t.day_to||''; document.getElementById('f-time-from').value=t.time_from||'';
  document.getElementById('f-time-to').value=t.time_to||''; document.getElementById('f-deadline').value=t.deadline||'';
  document.getElementById('f-cat').value=t.cat||'business'; selectQ(Number(t.quadrant)||1);
  document.getElementById('modal').style.display='flex';
}
function closeModal(){ document.getElementById('modal').style.display='none'; }
document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

async function saveTask(){
  const title=document.getElementById('f-title').value.trim(); if(!title) return;
  const id=document.getElementById('f-id').value; const btn=document.getElementById('save-btn');
  btn.disabled=true; const taskData={ title, cat:document.getElementById('f-cat').value, quadrant:selectedQ, mins:parseInt(document.getElementById('f-mins').value)||0, deadline:document.getElementById('f-deadline').value||'', recurrence:document.getElementById('f-recurrence').value, day_from:document.getElementById('f-day-from').value||'', day_to:document.getElementById('f-day-to').value||'', time_from:document.getElementById('f-time-from').value||'', time_to:document.getElementById('f-time-to').value||'' };
  if(id){ const t=tasks.find(x=>x.id===id); if(t) Object.assign(t,taskData); closeModal(); await apiFetch('POST',{action:'updateTask',id,fields:taskData}); }
  else { const newTask={id:String(nextId++),...taskData,done:false,status:'new',worked_mins:0}; tasks.push(newTask); closeModal(); await apiFetch('POST',{action:'addTask',task:newTask}); }
  btn.disabled=false; loadTasks();
}

function renderKanban(){
  const wrap=document.getElementById('kanban-wrap'); const active=tasks.find(t=>t.status==='inprogress'||t.status==='paused');
  if(!active){ wrap.innerHTML=`<div class="k-empty"><span class="k-empty-icon">⏱</span>Нет активной задачи</div>`; return; }
  const isPaused=active.status==='paused';
  let remainSec=isPaused?Number(active.paused_remaining)||0:Math.max(0,(Number(active.mins)||30)*60-Math.floor((new Date()-new Date(active.started_at))/1000));
  const totalSec=(Number(active.mins)||30)*60; const pct=totalSec?Math.min(100,Math.round((totalSec-remainSec)/totalSec*100)):0;

  /* ИСПРАВЛЕНИЕ: Кнопки 'Продолжить' и 'Готово' переставлены местами */
  wrap.innerHTML=`<div class="k-card ${isPaused?'paused':'inprogress'}">
    <div class="k-title">${active.title}</div>
    <div class="timer-block">
      <div class="timer-val" id="timer-val">${Math.floor(remainSec/60).toString().padStart(2,'0')}:${(remainSec%60).toString().padStart(2,'0')}</div>
      <div class="timer-prog"><div class="timer-fill" id="timer-fill" style="width:${pct}%"></div></div>
    </div>
    ${isPaused?`
    <div class="k-actions">
      <button class="kbtn kbtn-done" onclick="kanbanDone('${active.id}')">✅ Готово</button>
      <button class="kbtn kbtn-resume" onclick="kanbanResume('${active.id}')">▶ Продолжить</button>
    </div>
    <div class="k-actions2"><button class="kbtn kbtn-cancel" onclick="kanbanCancel('${active.id}')">↩ Вернуть в список</button></div>
    `:`
    <div class="k-actions">
      <button class="kbtn kbtn-done" onclick="kanbanDone('${active.id}')">✅ Готово</button>
      <button class="kbtn kbtn-pause" onclick="kanbanPause('${active.id}')">⏸ Пауза</button>
    </div>
    <div class="k-actions2"><button class="kbtn kbtn-cancel" onclick="kanbanCancel('${active.id}')">↩ Вернуть в список</button></div>`}
  </div>`;
  startTimerTick(active, remainSec, totalSec, isPaused);
}

function startTimerTick(task, initRemain, totalSec, isPaused){
  if(timerInterval) clearInterval(timerInterval); if(isPaused) return; let remain=initRemain;
  timerInterval=setInterval(()=>{
    const val=document.getElementById('timer-val'), fill=document.getElementById('timer-fill'); if(!val) return;
    remain=Math.max(0,remain-1); val.textContent=Math.floor(remain/60).toString().padStart(2,'0')+':'+(remain%60).toString().padStart(2,'0');
    if(fill) fill.style.width=Math.min(100,Math.round((totalSec-remain)/totalSec*100))+'%';
  },1000);
}

function getElapsedMinutes(task){
  return task?.started_at ? Math.floor((new Date() - new Date(task.started_at))/60000) : 0;
}

async function kanbanStart(id){
  const active=tasks.find(t=>t.status==='inprogress'||t.status==='paused'); if(active) return;
  const t=tasks.find(x=>x.id===id); if(!t) return; 
  t.status='inprogress'; t.started_at=new Date().toISOString(); t.paused_remaining=0; t.paused_at='';
  render(); showPage('kanban'); await apiFetch('POST',{action:'startTask',id});
}

async function kanbanPause(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  let diff = getElapsedMinutes(t);
  let elapsed = Math.floor((new Date()-new Date(t.started_at))/1000); 
  let remainSec = Math.max(0,(Number(t.mins)*60)-elapsed);
  t.status='paused'; t.paused_remaining=remainSec; t.worked_mins=(Number(t.worked_mins)||0)+diff; t.paused_at=new Date().toISOString(); 
  clearInterval(timerInterval); renderKanban(); render();
  await apiFetch('POST',{action:'updateTask',id,fields:{status:'paused',paused_remaining:remainSec,paused_at:t.paused_at,worked_mins:t.worked_mins}});
}

async function kanbanResume(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.status='inprogress'; t.mins=Math.ceil((t.paused_remaining||0)/60); t.started_at=new Date().toISOString(); t.paused_remaining=0; t.paused_at='';
  renderKanban(); render(); await apiFetch('POST',{action:'updateTask',id,fields:{status:'inprogress',mins:t.mins,started_at:t.started_at,paused_remaining:0,paused_at:''}});
}

/* ИСПРАВЛЕНИЕ: Авто-переброс на "Задачи" при отмене и завершении через Канбан */
async function kanbanCancel(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.status='new'; t.started_at=''; t.paused_remaining=0; t.paused_at=''; if(timerInterval) clearInterval(timerInterval);
  renderKanban(); render(); showPage('tasks'); 
  await apiFetch('POST',{action:'updateTask',id,fields:{status:'new',started_at:'',paused_remaining:0,paused_at:''}});
}

async function kanbanDone(id){
  const t=tasks.find(x=>x.id===id); if(!t) return; 
  const diff=getElapsedMinutes(t);
  t.done=true; t.status='done'; t.worked_mins=(Number(t.worked_mins)||0)+diff; t.started_at=''; t.paused_remaining=0; t.paused_at='';
  if(timerInterval) clearInterval(timerInterval);
  renderKanban(); render(); showPage('tasks'); 
  await apiFetch('POST',{action:'doneTask',id,workedMins:diff});
}

function showPage(p){
  currentPage=p; ['tasks','kanban','digest','settings'].forEach(x=>{ const pg=document.getElementById('page-'+x); if(pg) pg.style.display=x===p?'block':'none'; const b=document.getElementById('nav-'+x); if(b) b.classList.toggle('on',x===p); });
  if(p==='kanban') renderKanban();
}

['f-time-from','f-time-to'].forEach(initTimeMask); loadTasks();
</script>
</body>
</html>
